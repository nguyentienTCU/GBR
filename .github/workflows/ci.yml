name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend:
    name: Backend Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Compile backend sources
        run: python -m compileall app

      - name: Import FastAPI application
        env:
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_ANON_KEY: test-anon-key
          SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
          DOCUSIGN_INTEGRATION_KEY: test-docusign-integration-key
          DOCUSIGN_USER_ID: test-docusign-user-id
          DOCUSIGN_ACCOUNT_ID: test-docusign-account-id
          DOCUSIGN_BASE_PATH: https://demo.docusign.net/restapi
          DOCUSIGN_AUTH_SERVER: account-d.docusign.com
          DOCUSIGN_PRIVATE_KEY_PATH: ./test-docusign-private.key
          DOCUSIGN_REDIRECT_URI: https://example.com/docusign/callback
        run: python -c "from app.main import app; print(app.title)"

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
        run: npm run build
